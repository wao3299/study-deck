<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAA-C03 腕試しクイズ</title>
<style>
  :root {
    --bg: #0F151E;
    --bg-grad: #121A26;
    --surface: #1B2430;
    --surface-2: #212C3A;
    --line: #2C3848;
    --line-soft: #243040;
    --ink: #DCE4EE;
    --ink-soft: #C7D0DB;
    --muted: #7C8794;
    --accent: #F0A132;
    --accent-dim: rgba(240,161,50,0.14);
    --good: #3DD68C;
    --good-dim: rgba(61,214,140,0.12);
    --bad: #F2565B;
    --bad-dim: rgba(242,86,91,0.12);
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 50% -10%, var(--bg-grad), transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 660px; margin: 0 auto; padding: 32px 20px 80px; }

  header { margin-bottom: 24px; }
  .eyebrow {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent); margin: 0 0 8px;
  }
  h1 { font-size: 27px; font-weight: 700; letter-spacing: -0.01em; text-wrap: balance; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0; }
  .mode-tag {
    display: none; font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--bad); border: 1px solid var(--bad);
    border-radius: 6px; padding: 2px 8px; margin-top: 10px;
  }
  .mode-tag.on { display: inline-block; }

  .progress { margin-top: 22px; display: flex; align-items: center; gap: 14px; }
  .bar { flex: 1; height: 6px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
  .bar > span {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), #FFC56B);
    border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }
  .counter {
    font-family: var(--mono); font-size: 13px; color: var(--ink-soft);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }

  .card {
    background: linear-gradient(180deg, var(--surface), var(--surface) 60%, #19222E);
    border: 1px solid var(--line); border-radius: 16px; padding: 26px 24px; margin-top: 22px;
  }
  .qhead { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .chip {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--line); border-radius: 6px; padding: 3px 9px;
  }
  .chip.domain { color: var(--muted); }
  .chip.multi { color: var(--accent); border-color: var(--accent); }
  .qtext { font-size: 18px; line-height: 1.65; margin: 0 0 20px; text-wrap: pretty; }
  .qtext code, .explain code, .opt-exp code {
    font-family: var(--mono); font-size: 0.88em; background: var(--surface-2);
    padding: 1px 6px; border-radius: 5px; color: #FFD79A;
  }

  .opts { display: flex; flex-direction: column; gap: 10px; }
  .opt-row { display: flex; flex-direction: column; }
  .opt {
    display: flex; align-items: flex-start; gap: 12px; width: 100%; text-align: left;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 11px;
    padding: 14px 15px; color: var(--ink-soft); font-family: var(--sans); font-size: 15px;
    line-height: 1.55; cursor: pointer; transition: border-color .15s, background .15s, transform .08s;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: #26323F; }
  .opt:active:not(:disabled) { transform: scale(0.992); }
  .opt:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .opt:disabled { cursor: default; }
  .opt.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--ink); }

  .key {
    flex: none; width: 24px; height: 24px; border-radius: 6px; background: var(--bg);
    border: 1px solid var(--line); display: grid; place-items: center;
    font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 1px;
  }
  .opt.selected .key { border-color: var(--accent); color: var(--accent); }
  .opt.correct { border-color: var(--good); background: var(--good-dim); color: var(--ink); }
  .opt.correct .key { border-color: var(--good); color: var(--good); background: transparent; }
  .opt.wrong { border-color: var(--bad); background: var(--bad-dim); color: var(--ink); }
  .opt.wrong .key { border-color: var(--bad); color: var(--bad); background: transparent; }
  .opt.dimmed { opacity: 0.5; }

  /* 選択肢ごとの解説 */
  .opt-exp {
    font-size: 13.5px; line-height: 1.6; color: var(--ink-soft);
    padding: 9px 15px 4px 51px;
  }
  .opt-exp .tag {
    font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .05em;
    margin-right: 7px; padding: 1px 6px; border-radius: 5px; white-space: nowrap;
  }
  .opt-exp.ok .tag { color: var(--good); border: 1px solid var(--good); }
  .opt-exp.ng .tag { color: var(--bad); border: 1px solid var(--bad); }
  .opt-exp.ok { color: var(--ink-soft); }
  .opt-exp.ng { color: var(--muted); }

  /* まとめ解説 */
  .explain {
    margin-top: 18px; border-left: 3px solid var(--accent); background: var(--accent-dim);
    border-radius: 0 10px 10px 0; padding: 14px 16px;
  }
  .explain .verdict { font-weight: 700; font-size: 14px; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
  .explain.ok .verdict { color: var(--good); }
  .explain.ng .verdict { color: var(--bad); }
  .explain .label {
    font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--accent); margin: 0 0 4px;
  }
  .explain p.body { margin: 0; font-size: 14.5px; color: var(--ink-soft); }
  .explain strong { color: var(--ink); }

  .nav { margin-top: 22px; display: flex; justify-content: flex-end; gap: 12px; }
  .btn {
    font-family: var(--sans); font-size: 15px; font-weight: 600; color: var(--bg);
    background: var(--accent); border: none; border-radius: 10px; padding: 12px 24px;
    cursor: pointer; transition: background .15s, transform .08s, opacity .15s;
  }
  .btn:hover:not(:disabled) { background: #FFB44E; }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:focus-visible { outline: 2px solid #FFC56B; outline-offset: 2px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); }
  .btn.ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--ink); background: transparent; }

  [hidden] { display: none !important; }

  .result { text-align: center; }
  .score-ring { width: 160px; height: 160px; margin: 8px auto 18px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .num {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-family: var(--mono); font-variant-numeric: tabular-nums;
  }
  .score-ring .num b { font-size: 38px; font-weight: 700; color: var(--ink); line-height: 1; }
  .score-ring .num span { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; margin-top: 4px; }
  .verdict-line { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
  .verdict-desc { color: var(--muted); font-size: 14px; margin: 0 0 24px; }

  .breakdown { text-align: left; display: flex; flex-direction: column; gap: 8px; margin: 0 0 26px; }
  .brow {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 9px; font-size: 14px;
  }
  .brow .dot { width: 9px; height: 9px; border-radius: 99px; flex: none; }
  .brow .dot.ok { background: var(--good); }
  .brow .dot.ng { background: var(--bad); }
  .brow .topic { flex: 1; color: var(--ink-soft); }
  .brow .mark { font-family: var(--mono); font-size: 13px; }
  .brow .mark.ok { color: var(--good); }
  .brow .mark.ng { color: var(--bad); }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  .lifetime { margin-top: 14px; font-size: 13px; color: var(--muted); font-family: var(--mono); }
  .lifetime b { color: var(--ink); font-weight: 700; }
  .statsbox { text-align: left; margin: 4px 0 22px; }
  .stats-h { font-family: var(--mono); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin: 18px 0 10px; font-weight: 700; }
  .dom-bars { display: flex; flex-direction: column; gap: 7px; }
  .dom-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .dom-name { flex: none; width: 96px; color: var(--ink-soft); font-family: var(--mono); font-size: 11px; }
  .dom-track { flex: 1; height: 8px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
  .dom-fill { display: block; height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .dom-pct { flex: none; width: 40px; text-align: right; font-family: var(--mono); font-variant-numeric: tabular-nums; color: var(--ink-soft); }
  .weak-list { display: flex; flex-direction: column; gap: 6px; }
  .weak-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; font-size: 13px; }
  .weak-name { flex: 1; color: var(--ink-soft); }
  .weak-pct { flex: none; font-family: var(--mono); font-variant-numeric: tabular-nums; color: var(--bad); }
  .timer { font-family: var(--mono); font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; padding: 3px 10px; white-space: nowrap; }
  .timer.warn { color: var(--bad); border-color: var(--bad); animation: tpulse 1s ease-in-out infinite; }
  @keyframes tpulse { 50% { opacity: .5; } }
  @media (prefers-reduced-motion: reduce) { .timer.warn { animation: none; } }
  .home-modes { display: flex; flex-direction: column; gap: 12px; }
  .mode-btn { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; color: var(--ink); font-family: var(--sans); cursor: pointer; transition: border-color .15s, background .15s, transform .08s; }
  .mode-btn:hover { border-color: var(--accent); background: #26323F; }
  .mode-btn:active { transform: scale(.992); }
  .mode-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .mode-btn .mb-ico { flex: none; width: 42px; height: 42px; border-radius: 10px; display: grid; place-items: center; font-family: var(--mono); font-size: 14px; font-weight: 700; background: var(--bg); border: 1px solid var(--line); color: var(--muted); }
  .mode-btn.primary { border-color: var(--accent); background: var(--accent-dim); }
  .mode-btn.primary .mb-ico { border-color: var(--accent); color: var(--accent); background: transparent; }
  .mode-btn .mb-tt { display: flex; flex-direction: column; gap: 3px; }
  .mode-btn .mb-name { font-size: 15px; font-weight: 700; }
  .mode-btn .mb-desc { font-size: 12.5px; line-height: 1.5; color: var(--muted); }
  .home-life { font-family: var(--mono); font-size: 13px; color: var(--muted); margin: 20px 0 4px; }
  .home-life b { color: var(--ink); font-weight: 700; }
  .home-empty { color: var(--muted); font-size: 13.5px; text-align: center; margin: 20px 0 0; }
  .home-foot { display: flex; justify-content: center; margin-top: 22px; }
  .keyhint { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .chart-wrap { margin: 4px 0 8px; }
  .chart { width: 100%; height: auto; display: block; overflow: visible; }
  .chart-line { fill: none; stroke: var(--accent); stroke-width: 2; vector-effect: non-scaling-stroke; stroke-linejoin: round; stroke-linecap: round; }
  .chart-area { fill: var(--accent-dim); stroke: none; }
  .chart-pass { stroke: var(--good); stroke-width: 1; stroke-dasharray: 5 4; vector-effect: non-scaling-stroke; opacity: .55; }
  .chart-legend { display: flex; gap: 14px; flex-wrap: wrap; font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 8px; }
  .chart-legend .lg-pass { color: var(--good); }
  .chart-legend .lg-e { color: var(--good); }
  .chart-legend .lg-p { color: var(--accent); }
</style>
</head>
<body>


<div class="wrap">
  <header>
    <p class="eyebrow">AWS Certified · SAA-C03</p>
    <h1>Solutions Architect Associate 腕試し</h1>
    <p class="sub">297問のプールから出題。腕試し10問／本番65問／苦手中心モード。</p>
    <span class="mode-tag" id="modetag">弱点復習モード</span>
    <div class="progress" id="progress">
      <div class="bar"><span id="barfill"></span></div>
      <div class="counter" id="counter">01 / 10</div>
      <div class="timer" id="timer" hidden></div>
    </div>
    <div class="lifetime" id="lifetime" hidden></div>
  </header>

  <section id="home" class="card">
    <div class="home-modes">
      <button class="mode-btn primary" id="startExam">
        <span class="mb-ico">65</span>
        <span class="mb-tt"><span class="mb-name">本番形式で挑戦</span><span class="mb-desc">65問・130分・合格ライン72%。本試験を再現。</span></span>
      </button>
      <button class="mode-btn" id="startTest">
        <span class="mb-ico">10</span>
        <span class="mb-tt"><span class="mb-name">腕試し（10問）</span><span class="mb-desc">297問からランダムに10問。手軽に力試し。</span></span>
      </button>
      <button class="mode-btn" id="startWeak" hidden>
        <span class="mb-ico">◎</span>
        <span class="mb-tt"><span class="mb-name">苦手中心（10問）</span><span class="mb-desc">間違えた・未習得の問題を優先して10問。</span></span>
      </button>
    </div>
    <div class="statsbox" id="homestats"></div>
    <div class="home-foot"><button class="btn ghost" id="homereset" hidden>学習データをリセット</button></div>
  </section>

  <section id="quiz" class="card" aria-live="polite">
    <div class="qhead">
      <span class="chip domain" id="domain">Storage</span>
      <span class="chip multi" id="multibadge" hidden>複数選択 — 2つ選べ</span>
    </div>
    <p class="qtext" id="qtext"></p>
    <div class="opts" id="opts"></div>
    <div class="explain" id="explain" hidden>
      <p class="verdict" id="verdict"></p>
      <p class="label">ポイント</p>
      <p class="body" id="expltext"></p>
    </div>
    <div class="nav" style="justify-content:space-between; align-items:center;">
      <span class="keyhint">A–E / 1–5 で選択・Enter で決定</span>
      <button class="btn" id="action" disabled>回答する</button>
    </div>
  </section>

  <section id="result" class="card result" hidden>
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="70" fill="none" stroke="#243040" stroke-width="12"/>
        <circle id="ring" cx="80" cy="80" r="70" fill="none" stroke="#F0A132" stroke-width="12"
                stroke-linecap="round" stroke-dasharray="439.8" stroke-dashoffset="439.8"/>
      </svg>
      <div class="num"><b id="scorenum">0</b><span id="scoredenom">/ 10</span></div>
    </div>
    <p class="verdict-line" id="rverdict"></p>
    <p class="verdict-desc" id="rdesc"></p>
    <div class="breakdown" id="breakdown"></div>
    <div class="statsbox" id="statsbox"></div>
    <div class="nav" style="justify-content:center; flex-wrap:wrap;">
      <button class="btn" id="weak" hidden>苦手中心で10問</button>
      <button class="btn" id="review" hidden>間違えた問題を復習</button>
      <button class="btn" id="exambtn">本番65問に挑戦</button>
      <button class="btn ghost" id="retry">新しい10問に挑戦</button>
      <button class="btn ghost" id="tohome">ホームへ</button>
      <button class="btn ghost" id="resetstats" hidden>学習データをリセット</button>
    </div>
  </section>
</div>

<script>
/* a: number=単一選択 / array=複数選択（完全一致で正解）
   oe: 各選択肢（o と同順）の解説。正解選択肢=なぜ正しいか / 不正解=なぜ違うか */
let ALL = [];

const RING_C = 439.8;
let session = [];
let current = 0;
let selected = [];
let answered = false;
let results = [];
let reviewMode = false;
const EXAM_N = 65, EXAM_MIN = 130, PASS_PCT = 0.72;
let examMode = false;
let timerId = null, examEndsAt = 0;

const el = id => document.getElementById(id);
const KEYS = ["A","B","C","D","E"];

const LS_KEY = "saaQuizStats_v1";
const LS_HIST = "saaQuizHistory_v1";
function loadLS(k, def){ try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch(e){ return def; } }
function saveLS(k, v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
let STATS = loadLS(LS_KEY, {});
const keyOf = q => q.d + "|" + q.t;

function recordAnswer(q, correct){
  const k = keyOf(q);
  const s = STATS[k] || {seen:0, correct:0, wrong:0, lastWrong:0, lastSeen:0};
  s.seen++;
  if (correct) s.correct++; else { s.wrong++; s.lastWrong = Date.now(); }
  s.lastSeen = Date.now();
  STATS[k] = s;
  saveLS(LS_KEY, STATS);
}

function pickWeak(n){
  const scored = ALL.map(q=>{
    const s = STATS[keyOf(q)];
    let p, last = 0;
    if (!s || s.seen===0){ p = 1; }
    else {
      last = s.lastWrong || 0;
      const acc = s.correct / s.seen;
      if (s.correct === 0) p = 3;
      else if (acc < 0.5) p = 2.5;
      else if (acc < 1) p = 1.5;
      else p = 0.2;
    }
    return {q, p, last};
  });
  scored.sort((a,b)=> b.p - a.p || b.last - a.last);
  const poolSize = Math.min(scored.length, Math.max(n, n*2));
  return shuffle(scored.slice(0, poolSize).map(x=>x.q)).slice(0, n);
}

function renderLifetime(){
  const lt = el("lifetime");
  const keys = Object.keys(STATS);
  if (keys.length === 0){ lt.hidden = true; return; }
  let seen=0, correct=0;
  keys.forEach(k=>{ seen += STATS[k].seen; correct += STATS[k].correct; });
  const hist = loadLS(LS_HIST, []);
  const acc = seen ? Math.round(correct/seen*100) : 0;
  lt.hidden = false;
  lt.innerHTML = '学習済み <b>'+keys.length+'</b>/'+ALL.length+'問 · 通算正答率 <b>'+acc+'%</b> · <b>'+hist.length+'</b>セッション';
}

function renderStats(){
  renderLifetime();
  const box = el("statsbox");
  const keys = Object.keys(STATS);
  if (keys.length === 0){ box.innerHTML = ""; return; }
  const dom = {};
  keys.forEach(k=>{ const s=STATS[k]; const d=k.split("|")[0];
    dom[d] = dom[d] || {seen:0, correct:0};
    dom[d].seen += s.seen; dom[d].correct += s.correct; });
  const domRows = Object.keys(dom).map(d=>({d, a: Math.round(dom[d].correct/dom[d].seen*100)})).sort((x,y)=> x.a - y.a);
  let html = historyChartSVG() + '<h3 class="stats-h">分野別 通算正答率</h3><div class="dom-bars">';
  domRows.forEach(r=>{
    const col = r.a>=80?'var(--good)': r.a>=50?'var(--accent)':'var(--bad)';
    html += '<div class="dom-row"><span class="dom-name">'+r.d+'</span><span class="dom-track"><span class="dom-fill" style="width:'+r.a+'%;background:'+col+'"></span></span><span class="dom-pct">'+r.a+'%</span></div>';
  });
  html += '</div>';
  const weak = keys.map(k=>{ const s=STATS[k]; return {k, acc:s.correct/s.seen, wrong:s.wrong, last:s.lastWrong||0}; })
    .filter(x=> x.wrong>0)
    .sort((a,b)=> a.acc-b.acc || b.last-a.last)
    .slice(0, 8);
  if (weak.length){
    html += '<h3 class="stats-h">苦手トピック（要復習）</h3><div class="weak-list">';
    weak.forEach(x=>{
      const parts = x.k.split("|");
      html += '<div class="weak-row"><span class="weak-name">'+parts[0]+' / '+parts[1]+'</span><span class="weak-pct">'+Math.round(x.acc*100)+'%</span></div>';
    });
    html += '</div>';
  }
  box.innerHTML = html;
}

function historyChartSVG(){
  const hist = loadLS(LS_HIST, []);
  if (hist.length < 2) return "";
  const data = hist.slice(-30).map(h=>({ pct: h.total?Math.round(h.score/h.total*100):0, mode:h.mode }));
  const n = data.length, W=320, H=120, pad=8;
  const X = i => pad + (n===1?0:i/(n-1)*(W-2*pad));
  const Y = pct => pad + (1-pct/100)*(H-2*pad);
  const pts = data.map((d,i)=>({x:X(i), y:Y(d.pct), d}));
  const line = pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  const area = 'M'+pts[0].x.toFixed(1)+' '+(H-pad)+' '+pts.map(p=>'L'+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ')+' L'+pts[n-1].x.toFixed(1)+' '+(H-pad)+' Z';
  const y72 = Y(72).toFixed(1);
  const dots = pts.map(p=>{
    const col = p.d.mode==='exam' ? (p.d.pct>=72?'var(--good)':'var(--bad)') : 'var(--accent)';
    return '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3" fill="'+col+'"/>';
  }).join('');
  return '<h3 class="stats-h">成績の推移（直近'+n+'回）</h3>'+
    '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" class="chart" role="img" aria-label="成績推移">'+
      '<path d="'+area+'" class="chart-area"/>'+
      '<line x1="'+pad+'" y1="'+y72+'" x2="'+(W-pad)+'" y2="'+y72+'" class="chart-pass"/>'+
      '<path d="'+line+'" class="chart-line"/>'+dots+
    '</svg><div class="chart-legend"><span class="lg-pass">┄ 合格72%</span><span class="lg-p">● 腕試し/苦手</span><span class="lg-e">● 本番</span></div></div>';
}

function renderHomeStats(){
  const keys = Object.keys(STATS);
  const box = el("homestats");
  if (keys.length === 0){
    box.innerHTML = '<p class="home-empty">まだ学習履歴はありません。まずは腕試しから始めよう。</p>';
    el("startWeak").hidden = true;
    el("homereset").hidden = true;
    return;
  }
  el("startWeak").hidden = false;
  el("homereset").hidden = false;
  let seen=0, correct=0;
  keys.forEach(k=>{ seen += STATS[k].seen; correct += STATS[k].correct; });
  const hist = loadLS(LS_HIST, []);
  const acc = seen ? Math.round(correct/seen*100) : 0;
  let html = '<p class="home-life">学習済み <b>'+keys.length+'</b>/'+ALL.length+'問 · 通算正答率 <b>'+acc+'%</b> · <b>'+hist.length+'</b>セッション</p>';
  const dom = {};
  keys.forEach(k=>{ const s=STATS[k]; const d=k.split("|")[0];
    dom[d] = dom[d] || {seen:0, correct:0};
    dom[d].seen += s.seen; dom[d].correct += s.correct; });
  const domRows = Object.keys(dom).map(d=>({d, a: Math.round(dom[d].correct/dom[d].seen*100)})).sort((x,y)=> x.a - y.a);
  html += historyChartSVG();
  html += '<h3 class="stats-h">分野別 通算正答率</h3><div class="dom-bars">';
  domRows.forEach(r=>{
    const col = r.a>=80?'var(--good)': r.a>=50?'var(--accent)':'var(--bad)';
    html += '<div class="dom-row"><span class="dom-name">'+r.d+'</span><span class="dom-track"><span class="dom-fill" style="width:'+r.a+'%;background:'+col+'"></span></span><span class="dom-pct">'+r.a+'%</span></div>';
  });
  html += '</div>';
  const weak = keys.map(k=>{ const s=STATS[k]; return {k, acc:s.correct/s.seen, wrong:s.wrong, last:s.lastWrong||0}; })
    .filter(x=> x.wrong>0)
    .sort((a,b)=> a.acc-b.acc || b.last-a.last)
    .slice(0, 8);
  if (weak.length){
    html += '<h3 class="stats-h">苦手トピック（要復習）</h3><div class="weak-list">';
    weak.forEach(x=>{
      const parts = x.k.split("|");
      html += '<div class="weak-row"><span class="weak-name">'+parts[0]+' / '+parts[1]+'</span><span class="weak-pct">'+Math.round(x.acc*100)+'%</span></div>';
    });
    html += '</div>';
  }
  box.innerHTML = html;
}

function shuffle(arr){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
const isMulti = q => Array.isArray(q.a);
let cur = null;
function shuffledQuestion(q){
  const order = shuffle(q.o.map((_,i)=>i));
  const o = order.map(i=>q.o[i]);
  const oe = q.oe ? order.map(i=>q.oe[i]) : q.oe;
  let a;
  if (Array.isArray(q.a)) a = q.a.map(x=>order.indexOf(x)).sort((m,n)=>m-n);
  else a = order.indexOf(q.a);
  return Object.assign({}, q, {o, oe, a});
}

function startSession(questions, modeLabel){
  examMode = false;
  stopTimer();
  session = questions;
  current = 0;
  results = [];
  el("home").hidden = true;
  el("progress").hidden = false;
  renderLifetime();
  const mt = el("modetag");
  if (modeLabel){ mt.textContent = modeLabel; mt.classList.add("on"); }
  else mt.classList.remove("on");
  el("result").hidden = true;
  el("quiz").hidden = false;
  el("ring").style.transition = "none";
  el("ring").style.strokeDashoffset = RING_C;
  render();
}

function startExam(){
  startSession(shuffle(ALL).slice(0, EXAM_N), "本番モード（65問）");
  examMode = true;
  startTimer();
}

function fmtTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}
function tick(){
  const remain = Math.max(0, Math.round((examEndsAt - Date.now())/1000));
  const t = el("timer");
  t.hidden = false;
  t.textContent = "残り " + fmtTime(remain);
  t.classList.toggle("warn", remain <= 300);
  if (remain <= 0){ stopTimer(); showResult(); }
}
function startTimer(){
  examEndsAt = Date.now() + EXAM_MIN*60000;
  tick();
  timerId = setInterval(tick, 1000);
}
function stopTimer(){
  if (timerId){ clearInterval(timerId); timerId = null; }
  const t = el("timer");
  t.hidden = true;
  t.classList.remove("warn");
}
function showHome(){
  examMode = false;
  stopTimer();
  el("home").hidden = false;
  el("quiz").hidden = true;
  el("result").hidden = true;
  el("progress").hidden = true;
  el("lifetime").hidden = true;
  el("modetag").classList.remove("on");
  renderHomeStats();
}

function render(){
  const item = cur = shuffledQuestion(session[current]);
  selected = [];
  answered = false;

  el("domain").textContent = item.d;
  el("multibadge").hidden = !isMulti(item);
  el("qtext").innerHTML = item.q;
  const total = session.length;
  el("counter").textContent = String(current+1).padStart(2,"0") + " / " + String(total).padStart(2,"0");
  el("barfill").style.width = (current/total*100) + "%";

  const opts = el("opts");
  opts.innerHTML = "";
  item.o.forEach((text,i)=>{
    const row = document.createElement("div");
    row.className = "opt-row";
    const b = document.createElement("button");
    b.className = "opt";
    b.innerHTML = '<span class="key">'+KEYS[i]+'</span><span>'+text+'</span>';
    b.onclick = () => toggle(i);
    const exp = document.createElement("div");
    exp.className = "opt-exp";
    exp.hidden = true;
    row.appendChild(b);
    row.appendChild(exp);
    opts.appendChild(row);
  });

  el("explain").hidden = true;
  const action = el("action");
  action.textContent = "回答する";
  action.disabled = true;
}

function toggle(i){
  if (answered) return;
  const item = cur;
  if (isMulti(item)){
    const at = selected.indexOf(i);
    if (at>=0) selected.splice(at,1); else selected.push(i);
  } else {
    selected = [i];
  }
  el("opts").querySelectorAll(".opt").forEach((b,idx)=>{
    b.classList.toggle("selected", selected.includes(idx));
  });
  el("action").disabled = selected.length === 0;
}

function grade(){
  const item = cur;
  const correctSet = isMulti(item) ? item.a.slice() : [item.a];
  const sel = selected.slice().sort((x,y)=>x-y);
  const cor = correctSet.slice().sort((x,y)=>x-y);
  const isRight = sel.length===cor.length && sel.every((v,k)=>v===cor[k]);

  answered = true;
  const rows = el("opts").querySelectorAll(".opt-row");
  rows.forEach((row,i)=>{
    const b = row.querySelector(".opt");
    const exp = row.querySelector(".opt-exp");
    b.disabled = true;
    b.classList.remove("selected");
    const isCorrectOpt = correctSet.includes(i);
    if (isCorrectOpt) b.classList.add("correct");
    else if (selected.includes(i)) b.classList.add("wrong");
    else b.classList.add("dimmed");

    // 各選択肢の解説
    if (item.oe && item.oe[i]){
      exp.hidden = false;
      exp.className = "opt-exp " + (isCorrectOpt ? "ok" : "ng");
      const tag = isCorrectOpt ? "正解" : "不正解";
      exp.innerHTML = '<span class="tag">'+tag+'</span>'+item.oe[i];
    }
  });

  results.push({ q:item, topic:item.t, correct:isRight });
  recordAnswer(item, isRight);

  const ex = el("explain");
  ex.hidden = false;
  ex.className = "explain " + (isRight?"ok":"ng");
  const correctLabels = correctSet.map(i=>KEYS[i]).join("・");
  el("verdict").textContent = isRight ? "✓ 正解" : "✕ 不正解 — 正解は " + correctLabels;
  el("expltext").innerHTML = item.e;

  const action = el("action");
  action.disabled = false;
  action.textContent = (current === session.length-1) ? "結果を見る →" : "次へ →";
}

el("action").onclick = () => {
  if (!answered){ grade(); return; }
  if (current === session.length-1){ showResult(); }
  else { current++; render(); }
};

function showResult(){
  stopTimer();
  el("quiz").hidden = true;
  el("result").hidden = false;
  el("barfill").style.width = "100%";
  const total = session.length;
  el("counter").textContent = total + " / " + total;

  const score = results.filter(r=>r.correct).length;
  el("scorenum").textContent = score;
  el("scoredenom").textContent = "/ " + total;

  const offset = RING_C * (1 - score/total);
  requestAnimationFrame(()=>{
    el("ring").style.transition = "stroke-dashoffset 0.9s cubic-bezier(.4,0,.2,1)";
    el("ring").style.strokeDashoffset = offset;
  });

  const pct = score/total;
  let v,d,c;
  if (examMode){
    const pctInt = Math.round(pct*100);
    if (pct>=PASS_PCT){ v="合格 — "+pctInt+"%"; d="合格ライン（720/1000点 ≒ 72%）を超えています。この調子で本番へ。"; c="#3DD68C"; }
    else { v="不合格 — "+pctInt+"%"; d="合格ラインは 720/1000点（≒72%）。間違えた分野を復習して再挑戦しよう。"; c="#F2565B"; }
  }
  else if (pct>=0.9){ v="合格圏 — 文句なし"; d="本番でも通用するレベル。苦手分野だけ仕上げよう。"; c="#3DD68C"; }
  else if (pct>=0.7){ v="合格ライン上 — あと一歩"; d="基礎は固い。間違えた分野を復習すれば十分狙える。"; c="#F0A132"; }
  else if (pct>=0.5){ v="あと少し — 弱点を潰そう"; d="主要サービスの使い分けを重点的に復習しよう。"; c="#F0A132"; }
  else { v="基礎固めから"; d="各サービスが「何のためのものか」を一つずつ押さえよう。"; c="#F2565B"; }
  el("ring").setAttribute("stroke", c);
  el("rverdict").textContent = v;
  el("rverdict").style.color = c;
  el("rdesc").textContent = d;

  const bd = el("breakdown");
  bd.innerHTML = "";
  results.forEach((r,i)=>{
    const row = document.createElement("div");
    row.className = "brow";
    row.innerHTML =
      '<span class="dot '+(r.correct?"ok":"ng")+'"></span>'+
      '<span class="topic">Q'+(i+1)+'　'+r.q.d+' / '+r.topic+'</span>'+
      '<span class="mark '+(r.correct?"ok":"ng")+'">'+(r.correct?"正解":"不正解")+'</span>';
    bd.appendChild(row);
  });

  const wrong = results.filter(r=>!r.correct).map(r=>r.q);
  const reviewBtn = el("review");
  if (wrong.length>0){
    reviewBtn.hidden = false;
    reviewBtn.textContent = "間違えた " + wrong.length + " 問を復習";
    reviewBtn.onclick = () => startSession(shuffle(wrong), "弱点復習モード");
  } else {
    reviewBtn.hidden = true;
  }

  const hist = loadLS(LS_HIST, []);
  hist.push({ d: Date.now(), score: score, total: total, mode: examMode ? "exam" : "practice" });
  saveLS(LS_HIST, hist);
  renderStats();
  el("weak").hidden = false;
  el("weak").onclick = () => startSession(pickWeak(10), "苦手中心モード");
  el("resetstats").hidden = false;
  el("exambtn").onclick = () => startExam();
  el("tohome").onclick = () => showHome();
}

el("retry").onclick = () => startSession(shuffle(ALL).slice(0,10), "");
el("startTest").onclick = () => startSession(shuffle(ALL).slice(0,10), "");
el("startExam").onclick = () => startExam();
el("startWeak").onclick = () => startSession(pickWeak(10), "苦手中心モード");
function resetAll(){
  if (confirm("これまでの学習データ（成績・苦手記録）を消去します。よろしいですか？")){
    STATS = {}; saveLS(LS_KEY, STATS); saveLS(LS_HIST, []);
    renderStats(); renderLifetime(); renderHomeStats();
  }
}
el("resetstats").onclick = resetAll;
el("homereset").onclick = resetAll;

document.addEventListener("keydown", (e)=>{
  if (el("quiz").hidden || !cur) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key.toLowerCase();
  let idx = ["a","b","c","d","e"].indexOf(k);
  if (idx < 0) idx = ["1","2","3","4","5"].indexOf(k);
  if (idx >= 0 && idx < cur.o.length && !answered){ e.preventDefault(); toggle(idx); return; }
  if (e.key === "Enter" || e.key === " "){
    const action = el("action");
    if (!action.disabled){ e.preventDefault(); action.onclick(); }
  }
});

async function boot(){
  const res = await fetch("questions.json");
  ALL = await res.json();
  renderLifetime();
  showHome();
}
boot();
</script>
